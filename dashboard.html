<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輻射防護測驗 - 狀態儀表板</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #171717; color: #f5f5f5; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #525252; border-radius: 20px; }
        .glass-panel { background: rgba(38, 38, 38, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(82, 82, 82, 0.5); }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col custom-scrollbar">
    
    <!-- 導覽列 -->
    <header class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3 text-yellow-400">
            <i data-lucide="bar-chart-2" class="w-8 h-8"></i>
            <h1 class="text-xl md:text-2xl font-bold tracking-wider">輻射防護測驗結果儀表板</h1>
        </div>
        <div class="flex items-center space-x-4">
            <div id="status-badge" class="flex items-center px-3 py-1 rounded-full text-xs font-bold bg-yellow-400/20 text-yellow-400 border border-yellow-400/30">
                <span class="w-2 h-2 rounded-full bg-yellow-400 mr-2 animate-pulse"></span> 展示模式
            </div>
            <button onclick="fetchData()" class="p-2 rounded bg-neutral-800 hover:bg-neutral-700 transition-colors text-neutral-300">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-grow p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
        
        <!-- 統計卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel p-6 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-neutral-400 text-sm font-medium mb-1">總測驗人數</p>
                    <h3 id="stat-total" class="text-4xl font-black text-white">--</h3>
                </div>
                <div class="p-4 bg-blue-500/10 rounded-full text-blue-400"><i data-lucide="users" class="w-8 h-8"></i></div>
            </div>
            
            <div class="glass-panel p-6 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-neutral-400 text-sm font-medium mb-1">平均分數</p>
                    <h3 id="stat-avg" class="text-4xl font-black text-white">--</h3>
                </div>
                <div class="p-4 bg-green-500/10 rounded-full text-green-400"><i data-lucide="target" class="w-8 h-8"></i></div>
            </div>

            <div class="glass-panel p-6 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-neutral-400 text-sm font-medium mb-1">滿分率 (100分)</p>
                    <h3 id="stat-perfect" class="text-4xl font-black text-white">--</h3>
                </div>
                <div class="p-4 bg-yellow-500/10 rounded-full text-yellow-400"><i data-lucide="award" class="w-8 h-8"></i></div>
            </div>
        </div>

        <!-- 圖表區 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 圓餅圖：職類分佈 -->
            <div class="glass-panel p-6 rounded-xl flex flex-col h-[400px]">
                <h3 class="text-lg font-bold text-neutral-200 mb-4 flex items-center">
                    <i data-lucide="pie-chart" class="w-5 h-5 mr-2 text-yellow-400"></i> 參與測驗職類分佈
                </h3>
                <div class="flex-grow relative w-full flex justify-center">
                    <canvas id="jobChart"></canvas>
                </div>
            </div>

            <!-- 長條圖：各單位平均分數 -->
            <div class="glass-panel p-6 rounded-xl flex flex-col h-[400px]">
                <h3 class="text-lg font-bold text-neutral-200 mb-4 flex items-center">
                    <i data-lucide="building-2" class="w-5 h-5 mr-2 text-yellow-400"></i> 各單位平均分數表現
                </h3>
                <div class="flex-grow relative w-full">
                    <canvas id="deptChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 最新測驗紀錄表格 -->
        <div class="glass-panel p-6 rounded-xl">
            <h3 class="text-lg font-bold text-neutral-200 mb-4 flex items-center">
                <i data-lucide="list" class="w-5 h-5 mr-2 text-yellow-400"></i> 最新回報紀錄
            </h3>
            <div class="overflow-x-auto custom-scrollbar pb-2">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-neutral-400 text-sm border-b border-neutral-700">
                            <th class="py-3 px-4 font-medium">測驗時間</th>
                            <th class="py-3 px-4 font-medium">科室單位</th>
                            <th class="py-3 px-4 font-medium">職類</th>
                            <th class="py-3 px-4 font-medium">姓名</th>
                            <th class="py-3 px-4 font-medium text-right">分數</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm divide-y divide-neutral-800">
                        <!-- 資料由 JS 動態生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // ⚠️ 請在此處填寫您發布的 Google Apps Script Web App 網址 ⚠️
        // 注意：您的 GAS 必須加入 doGet 函式才能讀取資料
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbIcgORYwHixs6d-XO45ztdHsTIZuLndyLcs1A9EGwEhkTQ01816s-CZ5SYKWfr2cAGw/exec'; 

        // 全域圖表變數
        let jobChartInstance = null;
        let deptChartInstance = null;

        // --- 核心邏輯：獲取資料 ---
        async function fetchData() {
            try {
                // 嘗試從您的 GAS 抓取資料
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error('網路回應錯誤');
                const result = await response.json();
                
                if (result && result.length > 0) {
                    updateStatus(true);
                    processAndRender(result);
                    return;
                }
                throw new Error('未取得有效資料');
            } catch (error) {
                console.warn('無法連線到 Google Sheets API 或尚未設定 doGet，自動切換為展示模式：', error);
                updateStatus(false);
                // 產生展示用模擬資料
                const mockData = generateMockData();
                processAndRender(mockData);
            }
        }

        // --- 資料處理與渲染 ---
        function processAndRender(data) {
            // 1. 計算總覽數據
            const total = data.length;
            const avgScore = data.reduce((sum, row) => sum + Number(row['分數'] || row.score), 0) / total;
            const perfectCount = data.filter(row => Number(row['分數'] || row.score) === 100).length;
            const perfectRate = ((perfectCount / total) * 100).toFixed(1);

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-avg').innerText = avgScore.toFixed(1);
            document.getElementById('stat-perfect').innerText = `${perfectRate}%`;

            // 2. 處理圖表資料
            const jobCounts = {};
            const deptScores = {};

            data.forEach(row => {
                const job = row['職類'] || row.jobCategory;
                const dept = row['科室'] || row.department;
                const score = Number(row['分數'] || row.score);

                jobCounts[job] = (jobCounts[job] || 0) + 1;
                
                if (!deptScores[dept]) deptScores[dept] = { sum: 0, count: 0 };
                deptScores[dept].sum += score;
                deptScores[dept].count += 1;
            });

            // 3. 渲染職類圓餅圖
            renderJobPieChart(Object.keys(jobCounts), Object.values(jobCounts));

            // 4. 渲染科室長條圖
            const deptNames = Object.keys(deptScores);
            const deptAvgs = deptNames.map(dept => (deptScores[dept].sum / deptScores[dept].count).toFixed(1));
            renderDeptBarChart(deptNames, deptAvgs);

            // 5. 渲染表格 (顯示最新 15 筆，反轉陣列讓最新的在最上面)
            renderTable(data.reverse().slice(0, 15));
        }

        // --- 圖表繪製函式 ---
        Chart.defaults.color = '#a3a3a3';
        Chart.defaults.font.family = "'Noto Sans TC', sans-serif";

        function renderJobPieChart(labels, data) {
            const ctx = document.getElementById('jobChart').getContext('2d');
            if (jobChartInstance) jobChartInstance.destroy();

            jobChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#facc15', '#3b82f6', '#22c55e', '#ec4899', '#a855f7'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: '#d4d4d4' } }
                    },
                    cutout: '65%'
                }
            });
        }

        function renderDeptBarChart(labels, data) {
            const ctx = document.getElementById('deptChart').getContext('2d');
            if (deptChartInstance) deptChartInstance.destroy();

            deptChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '單位平均分數',
                        data: data,
                        backgroundColor: '#facc15',
                        borderRadius: 6,
                        barThickness: 24
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            max: 100, 
                            grid: { color: 'rgba(82, 82, 82, 0.3)' }
                        },
                        x: { 
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            data.forEach(row => {
                const score = Number(row['分數'] || row.score);
                const scoreColor = score === 100 ? 'text-green-400 font-bold' : (score < 60 ? 'text-red-400 font-bold' : 'text-neutral-200');
                
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-neutral-800/50 transition-colors';
                tr.innerHTML = `
                    <td class="py-3 px-4 whitespace-nowrap">${row['時間'] || row.timestamp}</td>
                    <td class="py-3 px-4">${row['科室'] || row.department}</td>
                    <td class="py-3 px-4">
                        <span class="px-2 py-1 bg-neutral-700/50 text-xs rounded-md text-neutral-300">
                            ${row['職類'] || row.jobCategory}
                        </span>
                    </td>
                    <td class="py-3 px-4">${row['姓名'] || row.name}</td>
                    <td class="py-3 px-4 text-right ${scoreColor}">${score}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStatus(isLive) {
            const badge = document.getElementById('status-badge');
            if (isLive) {
                badge.className = 'flex items-center px-3 py-1 rounded-full text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/30';
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span> 即時連線`;
            } else {
                badge.className = 'flex items-center px-3 py-1 rounded-full text-xs font-bold bg-yellow-400/20 text-yellow-400 border border-yellow-400/30';
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-400 mr-2 animate-pulse"></span> 展示模式`;
            }
        }

        // --- 產生模擬資料 (供預覽使用) ---
        function generateMockData() {
            const depts = ['放射科', '急診室', '心臟內科', '骨科', '牙科'];
            const jobs = ['醫師', '護理師', '醫事放射師', '行政人員'];
            const names = ['陳大文', '林小美', '張建國', '李雅婷', '王威宇', '吳宗穎', '劉靜香', '蔡家豪'];
            
            const mock = [];
            const now = new Date();
            
            for(let i=0; i<45; i++) {
                const date = new Date(now.getTime() - Math.random() * 7 * 24 * 60 * 60 * 1000);
                const isPerfect = Math.random() > 0.4;
                
                mock.push({
                    '時間': `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`,
                    '科室': depts[Math.floor(Math.random() * depts.length)],
                    '職類': jobs[Math.floor(Math.random() * jobs.length)],
                    '姓名': names[Math.floor(Math.random() * names.length)],
                    '分數': isPerfect ? 100 : [40, 60, 80][Math.floor(Math.random() * 3)]
                });
            }
            // 依時間排序
            return mock.sort((a, b) => new Date(a['時間']) - new Date(b['時間']));
        }

        // 初始化執行
        fetchData();
    </script>
</body>
</html>
